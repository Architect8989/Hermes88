# hermes-agent config.yaml -- Rhodawk AI Peak Architecture v10.0
# Path: $HERMES_HOME/config.yaml (expanded by init_and_start.sh)
#
# Schema follows hermes-agent cli-config.yaml.
# Unknown keys are silently ignored; this file covers all peak capabilities.

# -- Model configuration ----------------------------------------------------------
model:
  default: "${HERMES_MODEL}"
  routing:
    reasoning: "${HERMES_MODEL}"
    coding: "${OPENCLAUDE_MODEL}"
    scaffolding: "${JCODE_MODEL}"
    embedding: "text-embedding-3-small"
  failover:
    enabled: true
    chain:
      - model: "${HERMES_MODEL}"
        base_url: "${DO_INFERENCE_BASE_URL}"
        api_key: "${DO_INFERENCE_API_KEY}"
      - model: "${DO_FALLBACK_MODEL}"
        base_url: "${DO_INFERENCE_BASE_URL}"
        api_key: "${DO_INFERENCE_API_KEY}"
      - model: "kimi-k2.6"
        base_url: "${DO_INFERENCE_BASE_URL}"
        api_key: "${DO_INFERENCE_API_KEY}"
    triggers:
      - status_code: 429
      - status_code: 503
      - status_code: 500
      - timeout: true

# -- Terminal tool ----------------------------------------------------------------
terminal:
  backend: "local"
  cwd: "."
  timeout: 7200
  lifetime_seconds: 7200
  docker_mount_cwd_to_workspace: false
  max_background_processes: 10
  process_cleanup_interval: 300

# -- Persistent memory (enhanced with semantic layer) ------------------------------
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 16000
  user_char_limit: 4000
  nudge_interval: 10
  flush_min_turns: 6
  # Semantic memory engine
  semantic:
    enabled: true
    backend: "redis"
    redis_url: "${REDIS_URL}"
    index_name: "hermes:memory:vectors"
    embedding_model: "text-embedding-3-small"
    embedding_dimensions: 1536
    similarity_metric: "cosine"
    top_k: 10
    similarity_threshold: 0.72
    # Memory lifecycle
    importance_scoring: true
    temporal_decay_rate: 0.02
    decay_half_life_days: 30
    min_importance: 0.1
    max_memories: 10000
    # Auto-categorization
    auto_tag: true
    categories:
      - code_change
      - research
      - decision
      - task_outcome
      - operator_preference
      - system_event
      - financial
      - competitive_intel

# -- Context compression (aggressive for long sessions) ----------------------------
compression:
  enabled: true
  threshold: 0.55
  target_ratio: 0.20
  protect_last_n: 30
  strategy: "semantic_summary"
  summary_model: "${HERMES_MODEL}"
  preserve_tool_results: true
  preserve_code_blocks: true

# -- Display configuration --------------------------------------------------------
display:
  tool_progress: "all"
  streaming: true
  interim_assistant_messages: true
  cleanup_progress: false
  compact: false
  show_reasoning: false
  busy_input_mode: interrupt
  background_process_notifications: all

# -- YOLO mode (always on) --------------------------------------------------------
yolo: true

# -- Session management -----------------------------------------------------------
session_reset:
  on_command: "/new"
  on_platform_disconnect: false

# -- Task Queue -------------------------------------------------------------------
task_queue:
  enabled: true
  backend: "redis"
  redis_url: "${REDIS_URL}"
  queue_name: "hermes:tasks"
  result_queue: "hermes:results"
  worker_count: 5
  task_timeout: 3600
  result_ttl: 86400
  retry_policy:
    max_retries: 3
    backoff_base: 5
    backoff_multiplier: 2
  priorities:
    critical: 0
    high: 1
    normal: 2
    low: 3
    background: 4

# -- Event Bus --------------------------------------------------------------------
event_bus:
  enabled: true
  backend: "redis"
  redis_url: "${REDIS_URL}"
  channels:
    events: "hermes:events"
    tasks: "hermes:tasks:events"
    alerts: "hermes:alerts"
    health: "hermes:health"
  publish_events:
    - task_started
    - task_completed
    - task_failed
    - tool_called
    - model_fallback
    - memory_written
    - proactive_trigger
    - system_alert

# -- Cron Engine (APScheduler-based) -----------------------------------------------
cron:
  enabled: true
  engine: "apscheduler"
  config_dir: "/data/.hermes/cron"
  timezone: "UTC"
  job_store: "redis"
  job_store_url: "${REDIS_URL}"
  missed_grace_time: 900
  max_concurrent: 3
  coalesce: true
  default_executor: "threadpool"
  executor_workers: 5

# -- Proactive Intelligence --------------------------------------------------------
proactive:
  enabled: true
  scan_interval_seconds: 300
  sources:
    github:
      enabled: true
      repos:
        - "Architect8989/Hermes88"
      events:
        - workflow_failure
        - security_advisory
        - new_issue
        - pr_review_requested
    system:
      enabled: true
      checks:
        - disk_usage_threshold: 85
        - memory_usage_threshold: 90
        - process_health: true
        - container_health: true
    financial:
      enabled: "${STRIPE_API_KEY:+true}"
      provider: stripe
      alerts:
        - payment_failed
        - subscription_change
        - low_balance
    calendar:
      enabled: "${GOOGLE_CALENDAR_CREDENTIALS:+true}"
      lookahead_hours: 24
      reminder_minutes: [60, 15]

# -- Sandbox configuration ---------------------------------------------------------
sandbox:
  enabled: true
  manager_url: "http://sandbox-manager:8081"
  default_image: "rhodawk-sandbox:latest"
  max_concurrent: 5
  timeout: 600
  resource_limits:
    memory: "512m"
    cpu: "1.0"
    disk: "2g"
    network: "none"
  allowed_for:
    - untrusted_code
    - security_audit
    - dependency_install
    - test_execution

# -- MCP servers (populated at runtime by init_and_start.sh) -----------------------
mcp_servers: {}
