# =============================================================================
# Rhodawk AI — Hermes v8.0 (Jarvis-Grade CEO Assistant)
# docker compose deployment
#
# Changes v7 → v8:
#   FIX-3  camofox: replaced live-clone command with proper built image.
#          Previously: `node:20-slim` + apt-get + git clone + npm install on
#          every start — unreliable and slow. Now: Dockerfile.camofox bakes
#          everything at build time. Container start is instant.
#
# Deploy:
#   cp .env.example .env && nano .env   # fill in all required secrets
#   docker compose up -d --build
#
# Manage:
#   docker compose logs -f              # stream all logs
#   docker compose logs -f hermes       # gateway logs only
#   docker compose ps                   # container status
#   docker compose restart hermes       # restart bot only
#   docker compose down                 # stop all
#   docker compose up -d --build        # update after git pull
#
# FIX-6 NOTE: CAMOFOX_HOST must be "camofox" (the Docker service name).
#   If you see "localhost:9377" in /status output your .env has
#   CAMOFOX_HOST=localhost — remove that line. The correct value is
#   CAMOFOX_HOST=camofox and is set below in the environment block.
# =============================================================================

services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile.vps
    image: rhodawk-hermes:latest
    container_name: hermes
    env_file: .env
    environment:
      # Model assignments
      - HERMES_MODEL=deepseek-v4-pro
      - OPENCLAUDE_MODEL=deepseek-r1-distill-llama-70b
      - JCODE_MODEL=kimi-k2.6
      # FIX-6: Camofox is a sibling container — NEVER localhost from inside hermes.
      # This override wins over any CAMOFOX_HOST=localhost in your .env file.
      - CAMOFOX_HOST=camofox
      - CAMOFOX_PORT=9377
    volumes:
      # Persists across restarts: SQLite memory DB, hermes config, sessions, logs
      - hermes-data:/data
    restart: unless-stopped
    depends_on:
      camofox:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - supervisorctl
        - -c
        - /etc/supervisor/conf.d/rhodawk.conf
        - status
        - hermes-gateway
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  camofox:
    # FIX-3: Use pre-built image — no more live apt-get + git clone + npm install on start.
    build:
      context: .
      dockerfile: Dockerfile.camofox
    image: rhodawk-camofox:latest
    container_name: camofox
    ports:
      - "9377:9377"
    environment:
      - CAMOFOX_ACCESS_KEY=${CAMOFOX_ACCESS_KEY:-}
      - CAMOFOX_PORT=9377
    restart: unless-stopped
    volumes:
      - camofox_data:/home/node/.camofox
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9377/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  hermes-data:
    driver: local
  camofox_data:
    driver: local
